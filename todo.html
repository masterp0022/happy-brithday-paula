<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #taskInput { width: 300px; }
        #taskList { list-style-type: none; padding: 0; }
        .completed { text-decoration: line-through; }
    </style>
</head>
<body>
    <h1>To-Do List</h1>
    <input type="text" id="taskInput" placeholder="Add a new task...">
    <button id="addTaskButton">Add Task</button>
    <ul id="taskList"></ul>
    <script>
        const taskInput = document.getElementById('taskInput');
        const addTaskButton = document.getElementById('addTaskButton');
        const taskList = document.getElementById('taskList');

        // Load tasks from local storage
        const loadTasks = () => {
            const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
            tasks.forEach(task => addTaskToDOM(task.text, task.completed));
        };

        // Add task to DOM
        const addTaskToDOM = (task, completed) => {
            const li = document.createElement('li');
            li.textContent = task;
            if (completed) li.classList.add('completed');
            li.onclick = () => toggleTask(li);
            li.ondblclick = () => deleteTask(li);
            taskList.appendChild(li);
        };

        // Toggle task completion
        const toggleTask = (li) => {
            li.classList.toggle('completed');
            saveTasks();
        };

        // Delete task
        const deleteTask = (li) => {
            taskList.removeChild(li);
            saveTasks();
        };

        // Save tasks to local storage
        const saveTasks = () => {
            const tasks = [];
            [...taskList.children].forEach(li => {
                tasks.push({ text: li.textContent, completed: li.classList.contains('completed') });
            });
            localStorage.setItem('tasks', JSON.stringify(tasks));
        };

        // Add task on button click
        addTaskButton.addEventListener('click', () => {
            if (taskInput.value) {
                addTaskToDOM(taskInput.value, false);
                taskInput.value = '';
                saveTasks();
            }
        });

        // Load tasks on page load
        window.onload = loadTasks;
    </script>
</body>
</html>
