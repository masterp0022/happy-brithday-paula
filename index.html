<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Paula 💖</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
}

/* Intro */
#intro {
    position: absolute;
    width: 100%;
    top: 25%;
    z-index: 10;
    padding: 0 20px;
}

h1 {
    font-size: clamp(1.5rem, 5vw, 2.5rem);
}

/* Buttons */
button {
    padding: 12px 20px;
    font-size: clamp(14px, 3vw, 18px);
    border: none;
    border-radius: 10px;
    margin: 10px;
    cursor: pointer;
}

#yes {
    background: #ff4da6;
    color: white;
}

#no {
    background: gray;
    position: absolute;
    color: white;
}

/* Background */
#bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #1a001a, black);
    opacity: 0;
}

/* Floating lights */
.light {
    position: absolute;
    width: 6px;
    height: 6px;
    background: pink;
    border-radius: 50%;
    opacity: 0.7;
    animation: float linear infinite;
}

@keyframes float {
    from {transform: translateY(100vh);}
    to {transform: translateY(-10vh);}
}

/* Message */
#message {
    position: absolute;
    top: 40%;
    width: 100%;
    font-size: clamp(18px, 4vw, 26px);
    padding: 0 20px;
}

/* FINAL TITLE */
#bigTitle {
    font-size: clamp(40px, 10vw, 70px);
    font-weight: bold;
    color: #ff4da6;
    text-shadow: 0 0 20px #ff4da6, 0 0 40px #ff99cc;
    margin-bottom: 20px;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #ff4da6; }
    to { text-shadow: 0 0 40px #ff99cc, 0 0 60px #ff4da6; }
}

#finalText {
    font-size: clamp(18px, 4vw, 26px);
}
</style>
</head>

<body>

<div id="intro">
    <h1>Paula 💖<br>Do you want a birthday gift from me? 🎁</h1>
    <button id="yes">Yes</button>
    <button id="no">No</button>
</div>

<div id="bg"></div>
<div id="message"></div>

<audio id="music" src="happy.mp3"></audio>

<script>
const yes = document.getElementById("yes");
const no = document.getElementById("no");
const intro = document.getElementById("intro");
const bg = document.getElementById("bg");
const music = document.getElementById("music");
const messageBox = document.getElementById("message");

/* Move NO button safely */
function moveNoButton() {
    const maxX = window.innerWidth - no.offsetWidth;
    const maxY = window.innerHeight - no.offsetHeight;

    no.style.left = Math.random() * maxX + "px";
    no.style.top = Math.random() * maxY + "px";
}

/* Desktop hover */
no.addEventListener("mouseover", moveNoButton);

/* Mobile tap */
no.addEventListener("click", (e) => {
    e.preventDefault();
    moveNoButton();
});

/* Run from mouse pointer */
document.addEventListener("mousemove", (e) => {
    const rect = no.getBoundingClientRect();
    const distance = Math.hypot(
        e.clientX - (rect.left + rect.width / 2),
        e.clientY - (rect.top + rect.height / 2)
    );

    if (distance < 100) {
        moveNoButton();
    }
});

/* YES click */
yes.addEventListener("click", () => {
    intro.style.display = "none";
    bg.style.opacity = 1;
    music.play();

    createLights();
    showMessages();
});

/* Floating lights */
function createLights() {
    for (let i = 0; i < 50; i++) {
        let light = document.createElement("div");
        light.className = "light";
        light.style.left = Math.random() * 100 + "%";
        light.style.animationDuration = (3 + Math.random() * 5) + "s";
        document.body.appendChild(light);
    }
}

/* Messages */
const messages = [
"🎉 Happy Birthday Paula 💖",
"My one and only bestie ❤️",
"It's been over 3 years with you…",
"And honestly… it's been a crazy journey",
"Last year when we didn’t see for 5 months…",
"It really felt empty",
"But no matter what… you’re still my person",
"I cherish every moment we've shared",
"I wish you nothing but happiness and success",
"I want you to achieve everything you dream of ✨",
"I want you to go far in life",
"And one day… I hope I get to tell you this in person",
"I want to see the world with you 🌍",
"And most importantly…",
"I want you to be happy forever 💖"
];

let index = 0;

function showMessages() {
    typeText(messages[index]);
}

function typeText(text) {
    let i = 0;

    if (index === messages.length - 1) {
        messageBox.innerHTML = `
        <div id="bigTitle">HAPPY BIRTHDAY 🎉</div>
        <div id="finalText"></div>
        `;

        const finalText = document.getElementById("finalText");

        let typing = setInterval(() => {
            finalText.innerHTML += text.charAt(i);
            i++;

            if (i >= text.length) clearInterval(typing);
        }, 40);

    } else {
        messageBox.innerHTML = "";

        let typing = setInterval(() => {
            messageBox.innerHTML += text.charAt(i);
            i++;

            if (i >= text.length) {
                clearInterval(typing);
                setTimeout(() => {
                    index++;
                    if (index < messages.length) {
                        typeText(messages[index]);
                    }
                }, 2500);
            }
        }, 40);
    }
}
</script>

</body>
</html>
